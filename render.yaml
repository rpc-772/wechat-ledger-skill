services:
  - type: web
    name: wechat-ledger-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DATA_SOURCE_ID
        value: fcb01619-c5f3-825e-830a-01eeaeff9dad
      - key: NOTION_VERSION
        value: 2025-09-03
      - key: LEDGER_API_TOKEN
        sync: false
